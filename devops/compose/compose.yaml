services:
  frontend:
    build:
      context: ../..
      dockerfile: devops/docker/Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - backend_network
    volumes:
      - ../../devops/conf/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../frontend/static:/var/www/metrics_service/static:ro

  backend:
    build:
      context: ../..
      dockerfile: devops/docker/Dockerfile.backend
    networks:
      - backend_network
    command: uvicorn app.main:metrics_service_app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pg_metrics_data:/var/lib/postgresql/data
      - ../../db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  backend_network:
    driver: bridge

volumes:
  pg_metrics_data: